services:

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    image: ems-backend
    container_name: backend
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      DATABASE_URL: mongodb://mongodb:27017
    depends_on:
      - mongodb

  frontend:
    image: ems-frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
